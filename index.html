<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>gusan / 듣기 로그</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
  :root {
    --bg: #0a0a0c;
    --fg: #e6e3da;
    --dim: #6a685e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); overflow: hidden; }
  canvas { position: fixed !important; top: 0; left: 0; z-index: 0; }

  #overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 10; transition: opacity 800ms ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #enter {
    background: none; border: 1px solid var(--dim);
    color: var(--fg); font-family: 'Noto Serif KR', serif;
    font-size: 15px; padding: 0.8rem 2rem;
    letter-spacing: 0.15em; cursor: pointer;
    transition: border-color 200ms, background 200ms;
  }
  #enter:hover { border-color: var(--fg); background: rgba(255,255,255,0.02); }

  #hud {
    position: fixed; bottom: 1.5rem; left: 1.5rem; right: 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    color: var(--dim); font-size: 11px; letter-spacing: 0.15em;
    font-family: 'Noto Serif KR', serif;
    pointer-events: none; z-index: 5;
    opacity: 0; transition: opacity 1.5s ease 1s;
  }
  #hud.visible { opacity: 1; }
  #hud button {
    background: none; border: none; color: var(--dim);
    font-size: 18px; cursor: pointer; pointer-events: auto;
    line-height: 1; transition: color 200ms, opacity 200ms;
  }
  #hud button:hover { color: var(--fg); }

  #err {
    position: fixed; bottom: 4rem; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--dim); letter-spacing: 0.05em;
    max-width: 80%; text-align: center;
    font-family: 'Noto Serif KR', serif; z-index: 5;
  }
</style>
</head>
<body>

<div id="overlay">
  <button id="enter">▶  듣기</button>
</div>
<div id="hud">
  <span>gusan · seoul</span>
  <button id="mute" aria-label="mute">♪</button>
</div>
<audio id="audio" preload="auto" loop crossorigin="anonymous"></audio>
<div id="err"></div>

<script src="sketch.js"></script>
</body>
</html>
